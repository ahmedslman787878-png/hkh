[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/smm/create"
  to = "/.netlify/functions/smm-create"
  status = 200

[[redirects]]
  from = "/api/smm/status"
  to = "/.netlify/functions/smm-status"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
